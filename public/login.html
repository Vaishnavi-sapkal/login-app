<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — AuthApp</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --border: rgba(255,255,255,0.08);
      --accent: #7c5cfc;
      --accent2: #c084fc;
      --text: #f0eeff;
      --muted: #8b8ba0;
      --error: #ff6b81;
      --success: #56cfb2;
      --input-bg: rgba(255,255,255,0.04);
      --radius: 16px;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Background blobs */
    body::before {
      content: '';
      position: fixed;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(124,92,252,0.18) 0%, transparent 70%);
      top: -200px; left: -200px;
      animation: float 8s ease-in-out infinite;
    }
    body::after {
      content: '';
      position: fixed;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(192,132,252,0.12) 0%, transparent 70%);
      bottom: -150px; right: -150px;
      animation: float 10s ease-in-out infinite reverse;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-30px) scale(1.05); }
    }

    .container {
      width: 100%;
      max-width: 440px;
      padding: 24px;
      position: relative;
      z-index: 10;
      animation: slideUp 0.6s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(40px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .brand {
      text-align: center;
      margin-bottom: 36px;
    }
    .brand-icon {
      width: 56px; height: 56px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 16px;
      box-shadow: 0 8px 32px rgba(124,92,252,0.4);
    }
    .brand h1 {
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #fff 40%, var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .brand p {
      color: var(--muted);
      font-size: 14px;
      margin-top: 6px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 36px 32px;
      backdrop-filter: blur(20px);
      box-shadow: 0 32px 80px rgba(0,0,0,0.5);
    }

    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 8px;
      letter-spacing: 0.3px;
      text-transform: uppercase;
    }

    .input-wrap {
      position: relative;
    }
    .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 18px;
      pointer-events: none;
    }
    input {
      width: 100%;
      padding: 14px 14px 14px 44px;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
    input::placeholder { color: rgba(255,255,255,0.2); }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124,92,252,0.2);
    }

    .toggle-pw {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 18px;
      padding: 4px;
      transition: color 0.2s;
    }
    .toggle-pw:hover { color: var(--text); }

    .btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: var(--radius);
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
      box-shadow: 0 8px 24px rgba(124,92,252,0.4);
      margin-top: 8px;
    }
    .btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(124,92,252,0.55); }
    .btn:active:not(:disabled) { transform: translateY(0); }
    .btn:disabled { opacity: 0.7; cursor: not-allowed; }

    .alert {
      padding: 13px 16px;
      border-radius: 12px;
      font-size: 14px;
      margin-bottom: 20px;
      display: none;
      align-items: center;
      gap: 10px;
    }
    .alert.error  { background: rgba(255,107,129,0.12); border: 1px solid rgba(255,107,129,0.3); color: var(--error); display: flex; }
    .alert.success{ background: rgba(86,207,178,0.12); border: 1px solid rgba(86,207,178,0.3); color: var(--success); display: flex; }

    .divider {
      text-align: center;
      margin: 24px 0;
      position: relative;
      color: var(--muted);
      font-size: 13px;
    }
    .divider::before, .divider::after {
      content: '';
      position: absolute;
      top: 50%; width: 38%;
      height: 1px;
      background: var(--border);
    }
    .divider::before { left: 0; }
    .divider::after  { right: 0; }

    .footer-link {
      text-align: center;
      font-size: 14px;
      color: var(--muted);
      margin-top: 24px;
    }
    .footer-link a {
      color: var(--accent2);
      text-decoration: none;
      font-weight: 500;
    }
    .footer-link a:hover { text-decoration: underline; }

    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: inline-block;
      margin-right: 8px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <div class="brand">
      <div class="brand-icon">🔐</div>
      <h1>Welcome back</h1>
      <p>Sign in to continue to AuthApp</p>
    </div>

    <div class="card">
      <div class="alert" id="alert"></div>

      <div class="form-group">
        <label for="email">User Name</label>
        <div class="input-wrap">
          <span class="input-icon">✉️</span>
          <input type="text" id="username" placeholder="Enter your username" autocomplete="username" />
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrap">
          <span class="input-icon">🔑</span>
          <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" />
          <button class="toggle-pw" id="togglePw" type="button" title="Show/hide password">👁️</button>
        </div>
      </div>

      <button class="btn" id="loginBtn" onclick="handleLogin()">Sign In</button>

      <div class="divider">or</div>

      <div class="footer-link">
        Don't have an account? <a href="/register">Create one →</a>
      </div>
    </div>
  </div>

  <script>
    // Toggle password visibility
    document.getElementById('togglePw').addEventListener('click', () => {
      const pw = document.getElementById('password');
      const btn = document.getElementById('togglePw');
      pw.type = pw.type === 'password' ? 'text' : 'password';
      btn.textContent = pw.type === 'password' ? '👁️' : '🙈';
    });

    // Allow Enter key
    document.getElementById('password').addEventListener('keydown', e => {
      if (e.key === 'Enter') handleLogin();
    });
    document.getElementById('email').addEventListener('keydown', e => {
      if (e.key === 'Enter') handleLogin();
    });

    function showAlert(msg, type) {
      const el = document.getElementById('alert');
      el.className = 'alert ' + type;
      el.innerHTML = (type === 'error' ? '⚠️ ' : '✅ ') + msg;
    }

    async function handleLogin() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
      const alert = document.getElementById('alert');

      alert.className = 'alert';

      if (!username || !password) {
        return showAlert('Please fill in all fields.', 'error');
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Signing in…';

      try {
        const res = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();

        if (res.ok) {
          showAlert('Login successful! Redirecting…', 'success');
          setTimeout(() => window.location.href = '/dashboard', 800);
        } else {
          showAlert(data.message || 'Login failed.', 'error');
          btn.disabled = false;
          btn.textContent = 'Sign In';
        }
      } catch (err) {
        showAlert('Network error. Is the server running?', 'error');
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    }
  </script>
</body>
</html>
